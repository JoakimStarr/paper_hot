version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: paperpulse-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: paperpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - paperpulse-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paperpulse-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/paperpulse
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SCHEDULER_ENABLED: "true"
      FETCH_INTERVAL_HOURS: 24
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    networks:
      - paperpulse-network
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: paperpulse-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - paperpulse-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:

networks:
  paperpulse-network:
    driver: bridge
