services:
  # ============================================
  # Backend Service
  # ============================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    container_name: paper_hot_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/paperpulse.db
      - SCHEDULER_ENABLED=false
      - CORS_ORIGINS=["http://localhost:3000","http://127.0.0.1:3000","http://39.96.51.83:3000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - paper_hot_network

  # ============================================
  # Frontend Service
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_API_URL=http://39.96.51.83:8000/api
    container_name: paper_hot_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://39.96.51.83:8000/api
      - API_URL=http://backend:8000/api
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - paper_hot_network

# ============================================
# Networks
# ============================================
networks:
  paper_hot_network:
    driver: bridge
